{% extends "admin/layout.html" %}
{% block admin_content %}
<h1 class="text-3xl font-bold text-white mb-6">Profile Settings</h1>
<form method="POST" enctype="multipart/form-data" class="max-w-4xl space-y-8">
    
    <div class="bg-secondary p-6 rounded-xl border border-gray-800">
        <h2 class="text-xl font-bold text-white border-b border-gray-800 pb-4 mb-6">General Info</h2>
        <div class="grid md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm text-gray-400 mb-2">Display Name</label>
                <input type="text" name="name" value="{{ info.name }}" class="w-full bg-primary border border-gray-700 rounded p-3 text-white">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-2">Public Email</label>
                <input type="email" name="email" value="{{ info.email }}" class="w-full bg-primary border border-gray-700 rounded p-3 text-white">
            </div>
        </div>
        
        <div class="mt-6">
            <label class="block text-sm text-gray-400 mb-2">Short Bio</label>
            <textarea name="bio" rows="4" class="w-full bg-primary border border-gray-700 rounded p-3 text-white">{{ info.bio }}</textarea>
        </div>
        
        <div class="mt-6">
            <label class="block text-sm text-gray-400 mb-2">Current Profile Image</label>
            {% if info.profile_image %}
            <img src="{{ info.profile_image }}" class="w-24 h-24 object-cover rounded-full border-2 border-accent mb-4">
            {% endif %}
            <input type="file" name="profile_image" class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-primary file:text-accent hover:file:bg-gray-800 cursor-pointer">
            <div class="text-xs text-muted mt-2">Leaves empty to keep current image.</div>
        </div>
    </div>
    
    <div class="bg-secondary p-6 rounded-xl border border-gray-800">
        <h2 class="text-xl font-bold text-white border-b border-gray-800 pb-4 mb-6">Status & Hiring</h2>
        <div class="grid md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm text-gray-400 mb-2">Employment Status</label>
                <select name="employment_status" class="w-full bg-primary border border-gray-700 rounded p-3 text-white">
                    <option value="available" {% if info.employment_status == 'available' %}selected{% endif %}>Available for new opportunities</option>
                    <option value="not_available" {% if info.employment_status == 'not_available' %}selected{% endif %}>Employed / Unavailable</option>
                </select>
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm text-gray-400 mb-2">Hiring Info (Shown on Contact Page)</label>
                <textarea name="hiring_info" rows="3" class="w-full bg-primary border border-gray-700 rounded p-3 text-white">{{ info.hiring_info }}</textarea>
            </div>
        </div>
    </div>
    
    {% set links = info.get_social_links() %}
    <div class="bg-secondary p-6 rounded-xl border border-gray-800">
        <h2 class="text-xl font-bold text-white border-b border-gray-800 pb-4 mb-6">Social Links</h2>
        <div class="grid md:grid-cols-2 gap-6">
            <div><label class="block text-sm text-gray-400 mb-1">GitHub URL</label><input type="text" name="github" value="{{ links.get('github', '') }}" class="w-full bg-primary border border-gray-700 rounded p-3 text-white placeholder-gray-600" placeholder="https://github.com/..."></div>
            <div><label class="block text-sm text-gray-400 mb-1">LinkedIn URL</label><input type="text" name="linkedin" value="{{ links.get('linkedin', '') }}" class="w-full bg-primary border border-gray-700 rounded p-3 text-white placeholder-gray-600" placeholder="https://linkedin.com/in/..."></div>
            <div><label class="block text-sm text-gray-400 mb-1">YouTube URL</label><input type="text" name="youtube" value="{{ links.get('youtube', '') }}" class="w-full bg-primary border border-gray-700 rounded p-3 text-white placeholder-gray-600"></div>
            <div><label class="block text-sm text-gray-400 mb-1">Facebook URL</label><input type="text" name="facebook" value="{{ links.get('facebook', '') }}" class="w-full bg-primary border border-gray-700 rounded p-3 text-white placeholder-gray-600"></div>
        </div>
    </div>
    
    <div class="bg-secondary p-6 rounded-xl border border-gray-800">
        <h2 class="text-xl font-bold text-white border-b border-gray-800 pb-4 mb-6">Security</h2>
        <div>
            <label class="block text-sm text-gray-400 mb-2">New Password (leave blank to keep current)</label>
            <input type="password" name="new_password" class="w-full md:w-1/2 bg-primary border border-gray-700 rounded p-3 text-white">
        </div>
    </div>
    
    <div class="flex">
        <button type="submit" class="bg-accent text-primary px-8 py-3 rounded font-bold hover:bg-yellow-400 transition w-full md:w-auto">Save All Settings</button>
    </div>
</form>
{% endblock %}
