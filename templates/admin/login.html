<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{primary:'#111827', accent:'#F5A623'}}}}</script>
</head>
<body class="bg-primary flex items-center justify-center min-h-screen p-4">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-sm border border-gray-700">
        <h1 class="text-2xl font-bold text-white mb-6 text-center">Admin Access</h1>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="mb-6 p-3 bg-red-900/30 border border-red-500 text-red-300 rounded text-center text-sm">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
            <div>
                <input type="password" name="password" required placeholder="Enter master password"
                       class="w-full bg-gray-900 border border-gray-700 rounded shadow-sm py-3 px-4 text-white focus:outline-none focus:border-accent">
            </div>
            <button type="submit" class="w-full bg-accent text-primary font-bold py-3 rounded shadow hover:bg-yellow-400 transition">Unlock Dashboard</button>
        </form>
    </div>
</body>
</html>
